name: Deploy web UI to GitHub Pages

# Builds the pyverdex dashboard as a static, backend-optional showcase and
# publishes it to GitHub Pages. The live engine + web terminal need the FastAPI
# backend; the Pages build renders a bundled sample report and lets a visitor
# point at their own `pyverdex serve` URL.
#
# NOTE: VITE_BASE must match the repo name for a project site
# (https://<user>.github.io/<repo>/). Update it if the repo is renamed.

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          VITE_BASE: /pyverdex/
          VITE_OUT: dist
          VITE_STATIC_DEMO: "1"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
